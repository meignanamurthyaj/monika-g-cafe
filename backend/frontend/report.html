<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika G Cafe - Reports</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .metric-value { font-size: 2.25rem; font-weight: 800; color: var(--accent); margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar-container"></div>
    
    <main class="main-content">
        <h1>Cafe Performance Analytical Reports</h1>
        <p style="color: var(--text-secondary); margin-top: -1.5rem; margin-bottom: 2rem;">
            Analyze overall system volume metrics, inspect global profit margins, and track item statistics.
        </p>

        <div class="card">
            <button class="btn btn-accent" onclick="loadPerformanceReport()">🔄 Generate Sales & Product Metrics</button>
        </div>

        <div class="report-grid" id="reportDashboard" style="display: none;">
            <!-- Left Grid Pane: Financial Summary Cards -->
            <div class="card">
                <h3>Financial Sales Overview</h3>
                <div style="margin-top: 1.5rem;">
                    <p style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">Total Volume Processed</p>
                    <div class="metric-value" id="totalOrdersOut">0</div>
                </div>
                <div style="margin-top: 1.5rem;">
                    <p style="color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase;">Accumulated Net Income</p>
                    <div class="metric-value" id="totalRevenueOut">$0.00</div>
                </div>
            </div>

            <!-- Right Grid Pane: Volumetric Chart Table -->
            <div class="card">
                <h3>Top Selling Menu Items</h3>
                <div class="table-responsive-wrapper" style="width: 100%; overflow-x: auto; margin-top: 1rem;">
                    <table style="width: 100%;">
                        <thead>
                            <tr>
                                <th>Item Name Description</th>
                                <th style="text-align: right;">Total Sold Volume</th>
                            </tr>
                        </thead>
                        <tbody id="topItemsGrid">
                            <tr><td colspan="2" style="text-align: center; color: var(--text-secondary);">No data loaded.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        async function loadPerformanceReport() {
            // 1. Fetch Gross Sales Figures
            const salesRes = await apiRequest("/reports/sales-summary");
            // 2. Fetch Best Performing Items Array
            const itemsRes = await apiRequest("/reports/top-items");
            
            if ((salesRes && salesRes.error) || (itemsRes && itemsRes.error)) {
                alert("Failed to gather complete metrics. Check if data tables are empty.");
                return;
            }

            // Populate Financial Overview Details
            document.getElementById("totalOrdersOut").innerText = salesRes.total_orders;
            document.getElementById("totalRevenueOut").innerText = `$${parseFloat(salesRes.total_revenue).toFixed(2)}`;

            // Populate High Volume Sales Table Lines
            const itemsGrid = document.getElementById("topItemsGrid");
            if (itemsRes.length === 0) {
                itemsGrid.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--text-secondary);">No product units recorded sold yet.</td></tr>`;
            } else {
                itemsGrid.innerHTML = itemsRes.map(item => `
                    <tr>
                        <td><strong>🍟 ${item.item_name}</strong></td>
                        <td style="text-align: right; font-weight: 700; color: var(--accent);">${item.total_sold} units</td>
                    </tr>
                `).join("");
            }

            // Smoothly reveal dashboard grids on screen
            document.getElementById("reportDashboard").style.display = "grid";
        }
    </script>
</body>
</html>
