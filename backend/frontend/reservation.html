<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monika G Cafe - Reservations</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .reservation-workspace {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 2rem;
            align-items: start;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar-container"></div>
    
    <main class="main-content">
        <h1>Table Placement Systems</h1>
        <p style="color: var(--text-secondary); margin-top: -1.5rem; margin-bottom: 2rem;">
            Lock customer reservation timelines, configure guest distribution layouts, and review holds.
        </p>

        <div class="reservation-workspace">
            <!-- Left Side: Interactive Form Scheduler -->
            <div class="card">
                <h3>Lock Reservation</h3>
                <form id="resForm" style="margin-top: 1rem;">
                    <div class="form-group">
                        <label for="cust">Customer ID</label>
                        <input type="number" id="cust" placeholder="e.g. 1" required>
                    </div>
                    <div class="form-group">
                        <label for="tbl">Target Table ID</label>
                        <input type="number" id="tbl" placeholder="e.g. 2" required>
                    </div>
                    <div class="form-group">
                        <label for="guests">Guest Count</label>
                        <input type="number" id="guests" min="1" placeholder="2" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Timeline Schedule</label>
                        <input type="datetime-local" id="time" required>
                    </div>
                    <button type="submit" class="btn btn-accent" style="width: 100%;">Lock Reservation</button>
                </form>
            </div>

            <!-- Right Side: Live Grid Monitoring Board -->
            <div class="card">
                <h3>Active Placement Schedule Ledger</h3>
                <div class="table-responsive-wrapper" style="width: 100%; overflow-x: auto; margin-top: 1rem;">
                    <table style="min-width: 650px;">
                        <thead>
                            <tr>
                                <th>Res ID</th>
                                <th>Cust ID</th>
                                <th>Table ID</th>
                                <th>Guests</th>
                                <th>Schedule Time</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="resGrid">
                            <tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">Loading logs...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        async function fetchReservations() {
            const data = await apiRequest("/reservations/");
            const grid = document.getElementById("resGrid");
            
            if (data && !data.error) {
                if (data.length === 0) {
                    grid.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">No table reservations booked yet.</td></tr>`;
                } else {
                    grid.innerHTML = data.map(r => `
                        <tr>
                            <td>#${r.reservation_id}</td>
                            <td>User #${r.customer_id}</td>
                            <td>Table #${r.table_id}</td>
                            <td><strong>${r.number_of_guests} Pers</strong></td>
                            <td>${new Date(r.reservation_time).toLocaleString()}</td>
                            <td><span style="color:var(--accent); font-weight:600;">${r.status}</span></td>
                        </tr>
                    `).join("");
                }
            } else {
                grid.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--error);">Failed to access database array tables.</td></tr>`;
            }
        }

        document.getElementById("resForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const rawDateTime = document.getElementById("time").value; 
            const formattedTime = rawDateTime.replace("T", " ") + ":00"; // Converts directly to YYYY-MM-DD HH:MM:SS

            const payload = { 
                customer_id: parseInt(document.getElementById("cust").value), 
                table_id: parseInt(document.getElementById("tbl").value), 
                number_of_guests: parseInt(document.getElementById("guests").value), 
                reservation_time: formattedTime 
            };
            
            const res = await apiRequest("/reservations/", "POST", payload);
            if (res && !res.error) {
                alert("Reservation locked successfully!");
                document.getElementById("resForm").reset();
                fetchReservations();
            } else {
                alert("Hold Error: " + (typeof res?.detail === 'object' ? JSON.stringify(res.detail) : res?.detail));
            }
        });

        fetchReservations();
    </script>
</body>
</html>
